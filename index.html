<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Platform Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">GAMEBOX</div>
  <input type="text" placeholder="Pesquisar experiências">
  <div class="auth">
    <button>Entrar</button>
    <button class="signup">Cadastrar</button>
  </div>
</header>

<div class="container">
  <aside class="sidebar">
    <ul>
      <li>Home</li>
      <li>Perfil</li>
      <li>Amigos</li>
      <li>Marketplace</li>
      <li>Mensagens</li>
    </ul>
  </aside>

  <main>
    <h2>Popular agora</h2>
    <section class="games">
      <div class="card">Jogo 1</div>
      <div class="card">Jogo 2</div>
      <div class="card">Jogo 3</div>
      <div class="card">Jogo 4</div>
    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
